[project]
name = "pined-openssl"
version = "0.1.2"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=46.0.5",
]

[build-system]
requires = ["scikit-build-core", "pybind11"]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
cmake.source-dir = "src/pined/openssl"
wheel.packages = ["src/pined"]
wheel.install-dir = "pined/openssl"

[tool.pyright]
venv = ".venv"
venvPath = "."

[tool.ty.environment]
root = ["."]
