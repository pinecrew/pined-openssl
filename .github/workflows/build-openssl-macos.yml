name: macOS OpenSSL
on:
  workflow_dispatch:
  # schedule:
    # Run once a week on Fridays
    # - cron: "0 0 * * FRI"
  pull_request:
    paths:
      - '.github/workflows/build-openssl-macos.yml'
      - 'ci/install-openssl.sh'
      - 'ci/download-openssl.sh'

  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-openssl-macos.yml'
      - 'ci/install-openssl.sh'
      - 'ci/download-openssl.sh'

jobs:
  build:
    runs-on: macos-15
    name: "Build OpenSSL for macOS"
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false

      - name: Build OpenSSL
        run: |
          set -x
          mkdir artifact
          BASEDIR=$(pwd)
          ci/download-openssl.sh
          ci/install-openssl.sh ${BASEDIR}/artifact $(sysctl -n hw.logicalcpu)
        env:
          CFLAGS: "-mmacosx-version-min=11.0"

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: "openssl-macos-arm64"
          path: artifact/
