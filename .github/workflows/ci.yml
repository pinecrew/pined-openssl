name: Build, test and upload to PyPI

on: [push]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dawidd6/action-download-artifact@8a338493df3d275e4a7a63bcff3b8fe97e51a927 # v19
        with:
          repo: pinecrew/pined-openssl
          workflow: build-openssl-macos.yml
          branch: main
          workflow_conclusion: success
          name: openssl-macos-arm64
          path: "../openssl-macos-arm64/"
          github_token: ${{ secrets.GITHUB_TOKEN }}
        if: runner.os == 'macOS'

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: runner.os == 'Linux'

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ENVIRONMENT: 'OPENSSL_USE_STATIC_LIBS=TRUE'
          CIBW_ENVIRONMENT_MACOS: 'OPENSSL_ROOT_DIR=../openssl-macos-arm64/'
          CIBW_ENVIRONMENT_LINUX: 'OPENSSL_ROOT_DIR=/opt/openssl'
          CIBW_MANYLINUX_X86_64_IMAGE: ghcr.io/pinecrew/pined-openssl-builder-manylinux2014_x86_64:main
          CIBW_MUSLLINUX_X86_64_IMAGE: ghcr.io/pinecrew/pined-openssl-builder-musllinux_1_2_x86_64:main
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {project}/tests
          CIBW_SKIP: "cp3??t-*"

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Optional, use if you use setuptools_scm
        persist-credentials: false

    - name: Build SDist
      run: pipx run build --sdist

    - uses: actions/upload-artifact@v6
      with:
        name: cibw-sdist
        path: dist/*.tar.gz

  upload_all:
    needs: [build_wheels, make_sdist]
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
    - uses: actions/download-artifact@v8
      with:
        pattern: cibw-*
        path: dist
        merge-multiple: true

    - uses: pypa/gh-action-pypi-publish@release/v1
