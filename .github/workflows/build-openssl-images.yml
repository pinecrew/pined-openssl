name: Docker Image Builder

on:
  workflow_dispatch:
  # schedule:
    # Run once a week on Fridays
    # - cron: "0 0 * * FRI"
  pull_request:
    paths:
      - '.github/workflows/build-openssl-images.yml'
      - 'ci/Dockerfile'
      - 'ci/install-openssl.sh'
      - 'ci/download-openssl.sh'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-openssl-images.yml'
      - 'ci/Dockerfile'
      - 'ci/install-openssl.sh'
      - 'ci/download-openssl.sh'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        IMAGE:
          - { PLATFORM="manylinux2014_x86_64", PREREQUISITES="yum -y install binutils perl perl-IPC-Cmd perl-Time-Piece"}
          - { PLATFORM="musllinux_1_2_x86_64" }


    name: "${{ matrix.IMAGE.PLATFORM }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ghcr.io/pinecrew/pined-openssl-builder-${{ matrix.IMAGE.PLATFORM }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: ci
          build-args: |
            PYPA_IMAGE=${{ matrix.IMAGE.PLATFORM }}
            PREREQUISITES=${{ matrix.IMAGE.PREREQUISITES }}
            NPROCESSORS=4
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/pinecrew/pined-openssl-builder-${{ matrix.IMAGE.PLATFORM }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
